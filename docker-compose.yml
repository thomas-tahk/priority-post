services:
  postgres:
    image: postgres:17-alpine
    container_name: priority-post-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: priority_post
      POSTGRES_PASSWORD: priority_post_dev
      POSTGRES_DB: priority_post
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priority_post -d priority_post"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:17-alpine
    container_name: priority-post-pg-test
    profiles: ["test"]
    environment:
      POSTGRES_USER: priority_post
      POSTGRES_PASSWORD: priority_post_test
      POSTGRES_DB: priority_post_test
    ports:
      - "5434:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priority_post -d priority_post_test"]
      interval: 5s
      timeout: 5s
      retries: 10
