# Drag-and-Drop Reordering Implementation Plan

> **For agentic workers:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development (recommended) or superpowers:executing-plans to implement this plan task-by-task. Steps use checkbox (`- [ ]`) syntax for tracking.

**Goal:** Let the owner drag tasks into a manual order that persists and wins over the scorer, in the Overview list and within goals.

**Architecture:** A nullable `position` column makes manual order data. A pure `orderOpenTasks` sorter puts positioned tasks first (by position) and lets the scorer rank the rest. Dragging calls `moveTask`, which seeds positions from the scorer's order on the first drag and then inserts via fractional midpoints. `@dnd-kit` drives the UI with optimistic updates.

**Tech Stack:** Next.js 16 App Router, Drizzle/Postgres, TypeScript, Vitest, `@dnd-kit`. Spec: `docs/superpowers/specs/2026-06-02-dnd-reordering-design.md`.

**Branch:** all work on `dnd-reordering` (branched from `main`). Do not push until Task 9.

**Testing note:** pure functions (`midpoint`, `orderOpenTasks`) get full TDD. DB actions and React components are verified via `pnpm typecheck` + `pnpm build` + manual testing — consistent with the repo (no DB integration harness).

// Fractional position helpers for manual task ordering.

/** Position that lands a task between two neighbors (null = list edge). */
export function midpoint(prevPos: number | null, nextPos: number | null): number {
  if (prevPos !== null && nextPos !== null) return (prevPos + nextPos) / 2;
  if (prevPos !== null) return prevPos + 1;
  if (nextPos !== null) return nextPos - 1;
  return 0;
}
```

import { sortByScore, type TaskForScoring } from "./scorer";

/**
 * List order for open tasks: tasks the user has hand-placed come first (by
 * ascending position); everything else falls back to the deterministic scorer.
 * When nothing is positioned, this is exactly the scorer's order.
 */
export function orderOpenTasks<T extends TaskForScoring & { position: number | null }>(
  tasks: T[],
  now: Date
): T[] {
  const positioned = tasks.filter((t) => t.position !== null);
  const unpositioned = tasks.filter((t) => t.position === null);
  positioned.sort((a, b) => a.position! - b.position!);
  return [...positioned, ...sortByScore(unpositioned, now)];
}
```

Add at the end of `src/features/tasks/actions.ts`:

```ts
/**
 * Move a task to sit between prevId and nextId (either may be null at a list
 * edge) in the manual order. On the first-ever drag, seed positions for all
 * open tasks from the current scorer order so the global order stays coherent.
 */
export async function moveTask(
  taskId: number,
  prevId: number | null,
  nextId: number | null
) {
  const openTasks = await db.select().from(tasks).where(isNull(tasks.doneAt));
  const seeded = openTasks.some((t) => t.position !== null);

  if (!seeded) {
    const ordered = sortByScore(openTasks, new Date());
    for (let i = 0; i < ordered.length; i++) {
      await db.update(tasks).set({ position: i }).where(eq(tasks.id, ordered[i]!.id));
    }
  }

  const posOf = async (id: number | null): Promise<number | null> => {
    if (id === null) return null;
    const [row] = await db
      .select({ position: tasks.position })
      .from(tasks)
      .where(eq(tasks.id, id));
    return row?.position ?? null;
  };

  const newPos = midpoint(await posOf(prevId), await posOf(nextId));
  await db.update(tasks).set({ position: newPos }).where(eq(tasks.id, taskId));
  revalidatePath("/");
}
```

import { listTasks } from "@/features/tasks/queries";
import { listGoals } from "@/features/goals/queries";
import { score } from "@/features/tasks/scorer";
import { orderOpenTasks } from "@/features/tasks/ordering";
import { AppShell } from "@/features/tasks/AppShell";

export const dynamic = "force-dynamic";

export default async function Home() {
  const [tasks, goals] = await Promise.all([listTasks(), listGoals()]);
  const now = new Date();

  const open = tasks.filter((t) => t.doneAt === null);
  const orderedOpen = orderOpenTasks(open, now);
  const scoredOpen = orderedOpen.map((t) => ({ ...t, _score: score(t, now) }));
  const done = tasks.filter((t) => t.doneAt !== null);

  return <AppShell scoredOpen={scoredOpen} done={done} goals={goals} />;
}

```tsx
"use client";

import { useOptimistic, useTransition } from "react";
import {
  DndContext,
  closestCenter,
  PointerSensor,
  KeyboardSensor,
  useSensor,
  useSensors,
  type DragEndEvent,
} from "@dnd-kit/core";
import {
  SortableContext,
  verticalListSortingStrategy,
  useSortable,
  sortableKeyboardCoordinates,
  arrayMove,
} from "@dnd-kit/sortable";
import { CSS } from "@dnd-kit/utilities";
import type { Task } from "@/db/schema";
import type { ScoredTask } from "@/features/constellation/layout";
import { TaskRow } from "./TaskRow";
import { moveTask } from "./actions";

function SortableRow({
  task,
  isTop,
  onOpen,
}: {
  task: ScoredTask;
  isTop: boolean;
  onOpen: (t: Task) => void;
}) {
  const { attributes, listeners, setNodeRef, transform, transition, isDragging } =
    useSortable({ id: task.id });

  const style = {
    transform: CSS.Transform.toString(transform),
    transition,
    opacity: isDragging ? 0.5 : 1,
  };

  return (
    <div ref={setNodeRef} style={style} className="sortable-row">
      <button
        type="button"
        className="drag-handle"
        aria-label="Drag to reorder"
        {...attributes}
        {...listeners}
      >
        ⠿
      </button>
      <div
        className="sortable-row-body"
        data-detail-opener
        onClick={(e) => {
          const tag = (e.target as HTMLElement).tagName;
          if (["INPUT", "BUTTON", "TEXTAREA", "SELECT"].includes(tag)) return;
          onOpen(task);
        }}
      >
        <TaskRow task={task} isTop={isTop} />
      </div>
    </div>
  );
}

export function SortableTaskList({
  tasks,
  onOpen,
}: {
  tasks: ScoredTask[];
  onOpen: (t: Task) => void;
}) {
  const [, startTransition] = useTransition();
  const [optimistic, setOptimistic] = useOptimistic(
    tasks,
    (_current, next: ScoredTask[]) => next
  );

  const sensors = useSensors(
    useSensor(PointerSensor, { activationConstraint: { distance: 5 } }),
    useSensor(KeyboardSensor, { coordinateGetter: sortableKeyboardCoordinates })
  );

  function handleDragEnd(e: DragEndEvent) {
    const { active, over } = e;
    if (!over || active.id === over.id) return;

    const oldIndex = optimistic.findIndex((t) => t.id === active.id);
    const newIndex = optimistic.findIndex((t) => t.id === over.id);
    if (oldIndex === -1 || newIndex === -1) return;

    const next = arrayMove(optimistic, oldIndex, newIndex);
    const prevId = newIndex > 0 ? next[newIndex - 1]!.id : null;
    const nextId = newIndex < next.length - 1 ? next[newIndex + 1]!.id : null;

    startTransition(async () => {
      setOptimistic(next);
      await moveTask(Number(active.id), prevId, nextId);
    });
  }

  return (
    <DndContext sensors={sensors} collisionDetection={closestCenter} onDragEnd={handleDragEnd}>
      <SortableContext items={optimistic.map((t) => t.id)} strategy={verticalListSortingStrategy}>
        {optimistic.map((t, i) => (
          <SortableRow key={t.id} task={t} isTop={i === 0} onOpen={onOpen} />
        ))}
      </SortableContext>
    </DndContext>
  );
}
```
